# Config for the observability backend. These mirror the files in ../otel/ used
# by docker-compose; kept inline here so `kubectl apply -k k8s/` works without
# relaxing Kustomize's load restrictor. If you change ../otel/*, update here too.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 1s
    exporters:
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
      clickhouse:
        endpoint: tcp://clickhouse:9000?dial_timeout=10s
        database: otel
        username: default
        password: ""
        ttl: 72h
        create_schema: true
        traces_table_name: otel_traces
        timeout: 10s
        retry_on_failure:
          enabled: true
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger, clickhouse, debug]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8889"]
      - job_name: spring-actuator
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - "gateway-service:8080"
              - "order-service:8081"
              - "inventory-service:8082"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
