# OpenTelemetry Collector pipeline.
# Receives OTLP from the Java agents, forwards traces to Jaeger and exposes
# metrics for Prometheus to scrape.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s

exporters:
  # Traces -> Jaeger (Jaeger all-in-one accepts OTLP on 4317)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics -> Prometheus scrape endpoint exposed by the collector
  prometheus:
    endpoint: 0.0.0.0:8889

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
