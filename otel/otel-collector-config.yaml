# OpenTelemetry Collector pipeline.
# Receives OTLP from the Java agents, forwards traces to Jaeger and exposes
# metrics for Prometheus to scrape.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s

exporters:
  # Traces -> Jaeger (Jaeger all-in-one accepts OTLP on 4317)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics -> Prometheus scrape endpoint exposed by the collector
  prometheus:
    endpoint: 0.0.0.0:8889

  # Traces -> ClickHouse (powers the Real-Time APM Dashboard).
  # The exporter auto-creates the `otel` database and `otel_traces` table.
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: otel
    username: default
    password: ""
    ttl: 72h
    create_schema: true
    traces_table_name: otel_traces
    timeout: 10s
    retry_on_failure:
      enabled: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, clickhouse, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
