global:
  scrape_interval: 5s

scrape_configs:
  # Metrics exported by the OTel Collector (app metrics from the Java agents)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Spring Boot Actuator Prometheus endpoints (JVM, HTTP server metrics)
  - job_name: spring-actuator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "gateway-service:8080"
          - "order-service:8081"
          - "inventory-service:8082"
