# Full APM demo stack:
#   3 instrumented Spring Boot services  ->  OTel Collector  ->  Jaeger (traces) + Prometheus (metrics) -> Grafana
#
#   Run:  docker compose up --build
#   Then: POST http://localhost:8080/api/checkout/SKU-001
#   View: Jaeger http://localhost:16686  |  Prometheus http://localhost:9090  |  Grafana http://localhost:3000

name: apm-otel-microservices

services:
  # ---------- Observability backend ----------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter scrape endpoint
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ---------- Application services ----------
  inventory-service:
    build:
      context: .
      args:
        SERVICE: inventory-service
    environment:
      - OTEL_SERVICE_NAME=inventory-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    ports:
      - "8082:8082"
    depends_on:
      - otel-collector

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    environment:
      - OTEL_SERVICE_NAME=order-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - INVENTORY_SERVICE_URL=http://inventory-service:8082
    ports:
      - "8081:8081"
    depends_on:
      - inventory-service
      - otel-collector

  gateway-service:
    build:
      context: .
      args:
        SERVICE: gateway-service
    environment:
      - OTEL_SERVICE_NAME=gateway-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - ORDER_SERVICE_URL=http://order-service:8081
    ports:
      - "8080:8080"
    depends_on:
      - order-service
      - otel-collector
