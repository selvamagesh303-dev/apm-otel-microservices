# Full APM portfolio stack.
#
# Project 1 — instrumented microservices:  gateway -> order -> inventory
# Project 2 — real-time dashboard:          ClickHouse + FastAPI + Next.js
#
# Telemetry flow:
#   services --OTLP--> OTel Collector --+--> Jaeger      (trace explorer)
#                                       +--> Prometheus  (metrics) --> Grafana
#                                       +--> ClickHouse  --> dashboard-backend --WS/REST--> dashboard-frontend
#
#   Run:  docker compose up --build
#   Then: ./scripts/load-test.ps1 -Count 80
#   UIs:  Dashboard http://localhost:3000 | Jaeger :16686 | Prometheus :9090 | Grafana :3000... (see README)

name: apm-otel-microservices

services:
  # ---------- Observability backend ----------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter scrape endpoint
    depends_on:
      - jaeger
      - clickhouse

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"   # Grafana moved to 3001 (dashboard frontend owns 3000)
    depends_on:
      - prometheus

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      - CLICKHOUSE_DB=otel
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP (used by dashboard backend)
      - "9000:9000"   # native (used by OTel Collector exporter)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- Project 1: application microservices ----------
  inventory-service:
    build:
      context: ./microservices
      args:
        SERVICE: inventory-service
    environment:
      - OTEL_SERVICE_NAME=inventory-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    ports:
      - "8082:8082"
    depends_on:
      - otel-collector

  order-service:
    build:
      context: ./microservices
      args:
        SERVICE: order-service
    environment:
      - OTEL_SERVICE_NAME=order-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - INVENTORY_SERVICE_URL=http://inventory-service:8082
    ports:
      - "8081:8081"
    depends_on:
      - inventory-service
      - otel-collector

  gateway-service:
    build:
      context: ./microservices
      args:
        SERVICE: gateway-service
    environment:
      - OTEL_SERVICE_NAME=gateway-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - ORDER_SERVICE_URL=http://order-service:8081
    ports:
      - "8080:8080"
    depends_on:
      - order-service
      - otel-collector

  # ---------- Project 2: real-time APM dashboard ----------
  dashboard-backend:
    build:
      context: ./dashboard/backend
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=otel
      - FRONTEND_ORIGIN=http://localhost:3000
      # Optional notifications — set to enable real alerts:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy

  dashboard-frontend:
    build:
      context: ./dashboard/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - dashboard-backend
